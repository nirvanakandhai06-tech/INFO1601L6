<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <title>Lab 6 - Ajax Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  </head>

  <body>

    <nav>
      <div class="nav-wrapper teal" style="padding-left: 10px;">
        <a href="#!" class="brand-logo">Ajax Demo</a>
      </div>
    </nav>

    <main class="row" style="padding: 40px">

      <!-- Task 2 - Alert / Confirm / Prompt buttons -->
      <div style="margin-bottom: 20px;">
        <button onclick="alertFun()">Alert</button>
        <button onclick="confirmFun()">Confirm</button>
        <button onclick="promptFun()">Prompt</button>
      </div>

      <!-- Task 5 - Button with event listeners -->
      <input id="myBtn" type="button" onclick="myFun()" value="click me"/>

      <!-- Exercise - Image from placecage -->
      <div style="margin: 20px 0;">
        <img id="cageImg" src="https://www.placecage.com/200/200" alt="Nicolas Cage"/>
      </div>

      <!-- Task 6.1 - Table -->
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Type</th>
            <th>Website</th>
          </tr>
        </thead>
        <tbody id="result">
        </tbody>
      </table>

    </main>

    <script>

      function alertFun() {
        alert("Hello !");
      }

      function confirmFun() {
        let didConfirm = confirm("Are you sure about that?");
        if (didConfirm) {
          alert("You confirmed :)");
        } else {
          alert("You did not confirm :(");
        }
      }

      function promptFun() {
        let val = prompt("What is your name?");
        alert(`You've entered: ${val}`);
      }

      console.log(window.navigator.cookieEnabled);
      console.log(window.navigator.onLine);
      console.log(navigator.appVersion);
      console.log(navigator.userAgent);
      console.log(navigator.platform);

      console.log(window.location.href);
      console.log(window.location.protocol);
      console.log(window.location.hostname);

      function redirect(url) {
        window.location.assign(url);
      }

      window.onload = function(event) {
        console.log("Page has loaded");
      }

      const result = document.querySelector('#result');


      function myFun() {
        alert("hello");
      }

      function myFun2() {
        console.log("myFun2 called");
      }

      function logEventType(event) {
        console.log(event.type);
      }

      let myBtn = document.querySelector("#myBtn");
      myBtn.addEventListener("click", myFun2);
      myBtn.addEventListener("mouseover", logEventType);
      myBtn.addEventListener("mouseout", logEventType);

      function loaded() {
        console.log("img loaded");
      }

      let cageImg = document.querySelector("#cageImg");
      cageImg.addEventListener("load", loaded);

      function drawTable(records) {
        let result = document.querySelector('#result');
        let html = '';
        for (let record of records) {
          html += `<tr id="${record.id}">
            <td>${record.id}</td>
            <td>${record.name}</td>
            <td>${record.brewery_type}</td>
            <td><a href="#${record.id}" onclick="getData('https://api.openbrewerydb.org/breweries/${record.id}', drawDetails)">View More Details</a></td>
          </tr>`;
        }
        result.innerHTML = html;
      }

      function drawDetails(record) {
        // record may be an array or a single object depending on API response
        let data = Array.isArray(record) ? record[0] : record;
        alert(`
          Name: ${data.name}
          Type: ${data.brewery_type}
          City: ${data.city}
          State: ${data.state}
          Website: ${data.website_url}
        `);
      }

      async function getData(url, renderFun) {
        try {
          let response = await fetch(url);
          let result = await response.json();
          renderFun(result);
        } catch(e) {
          console.log(e);
        }
      }

      // Fetch brewery data on page load
      getData("https://api.openbrewerydb.org/breweries/search?query=harry", drawTable);

    </script>
  </body>
</html>
